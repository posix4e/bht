name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build Chrome extension
      run: |
        npm run build
        mkdir -p artifacts
        cd dist && zip -r ../artifacts/chrome-extension.zip .
    
    - name: Build Safari iOS extension
      run: |
        xcrun safari-web-extension-converter dist --project-location artifacts/safari-ios --app-name 'Browser History Tracker' --bundle-identifier 'dev.allhands.browserhistorytracker' --no-open --force
        cd artifacts/safari-ios
        xcodebuild -scheme "Browser History Tracker (iOS)" -configuration Debug -sdk iphonesimulator -derivedDataPath build
        mkdir -p ../safari-ios-app
        cp -r build/Build/Products/Debug-iphonesimulator/*.app ../safari-ios-app/
    
    - name: Install Playwright
      run: npx playwright install --with-deps chromium
    
    - name: Run Playwright tests with xvfb
      run: |
        mkdir -p artifacts/screenshots
        xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm run test || true
    
    - name: Test Safari iOS in simulator
      run: |
        xcrun simctl boot "iPhone 14"
        xcrun simctl install booted artifacts/safari-ios-app/*.app
        xcrun simctl launch --console-pty booted dev.allhands.browserhistorytracker &
        sleep 10
        xcrun simctl io booted screenshot artifacts/screenshots/safari-ios-screenshot.png
        xcrun simctl terminate booted dev.allhands.browserhistorytracker
        xcrun simctl shutdown booted
    
    - name: Upload Chrome extension artifact
      uses: actions/upload-artifact@v4
      with:
        name: chrome-extension
        path: artifacts/chrome-extension.zip
    
    - name: Upload Safari iOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: safari-ios-app
        path: artifacts/safari-ios-app
    
    - name: Upload test screenshots
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots
        path: artifacts/screenshots
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results