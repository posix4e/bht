<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Browser History Tracker Settings</title>
  <link rel="stylesheet" href="css/options.css">
</head>
<body>
  <div class="container">
    <h1>Browser History Tracker Settings</h1>
    
    <div class="section">
      <h2>Device Information</h2>
      <div class="form-group">
        <label for="device-id">Device ID:</label>
        <div class="input-with-button">
          <input type="text" id="device-id" readonly>
          <button id="regenerate-device-id">Regenerate</button>
        </div>
      </div>
    </div>
    
    <div class="section">
      <h2>Holepunch Keys</h2>
      <p class="description">These keys are used to synchronize your history across devices. Share them with your other devices to sync history.</p>
      
      <div class="form-group">
        <label for="public-key">Public Key:</label>
        <div class="input-with-button">
          <input type="text" id="public-key" readonly>
          <button id="copy-public-key">Copy</button>
        </div>
      </div>
      
      <div class="form-group">
        <label for="private-key">Private Key:</label>
        <div class="input-with-button">
          <input type="text" id="private-key" readonly>
          <button id="copy-private-key">Copy</button>
        </div>
      </div>
      
      <div class="form-group">
        <button id="generate-new-keys">Generate New Keys</button>
        <button id="import-keys">Import Keys</button>
      </div>
    </div>
    
    <div class="section">
      <h2>History Settings</h2>
      
      <div class="form-group">
        <label for="expiration-days">History Expiration (days):</label>
        <input type="number" id="expiration-days" min="1" max="365">
      </div>
    </div>
    
    <div class="section actions">
      <button id="save-settings" class="primary">Save Settings</button>
      <button id="reset-settings">Reset to Defaults</button>
    </div>
    
    <div id="status-message" class="status-message"></div>
  </div>
  
  <!-- Import Keys Modal -->
  <div id="import-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Import Keys</h2>
      
      <div class="form-group">
        <label for="import-public-key">Public Key:</label>
        <input type="text" id="import-public-key">
      </div>
      
      <div class="form-group">
        <label for="import-private-key">Private Key:</label>
        <input type="text" id="import-private-key">
      </div>
      
      <div class="form-group">
        <button id="confirm-import" class="primary">Import</button>
        <button id="cancel-import">Cancel</button>
      </div>
    </div>
  </div>
  
  <script src="js/options.js" type="module"></script>
</body>
</html>
